[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-m 'not live'"
markers = [
  "live: hits real Vertex AI / Gemini — opt in via `pytest -m live`",
]
filterwarnings = [
  "ignore::DeprecationWarning:pydantic.*",
  "ignore::DeprecationWarning:google.*",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]
